<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Triagem AI</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }

      textarea {
        width: 100%;
        height: 200px;
      }

      button {
        margin-top: 10px;
        padding: 10px 20px;
        cursor: pointer;
      }

      .card {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
      }
    </style>
  </head>

  <body>
    <h1>Sistema de Triagem</h1>

    <p>Cole aqui o Bundle FHIR:</p>

    <textarea id="fhirInput" placeholder="Cole o JSON FHIR aqui..."></textarea>

    <br />

    <button onclick="enviar()">Enviar para análise</button>

    <div class="card" id="resultado"></div>

    <script>
      async function enviar() {
        const bundle = document.getElementById("fhirInput").value;

        try {
          const response = await fetch(
            "https://triage-api-3wks.onrender.com/analise/fhir",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                bundleJson: bundle,
              }),
            },
          );

          if (!response.ok) {
            throw new Error("Erro na API");
          }

          const data = await response.json();

          document.getElementById("resultado").innerHTML = `
          <h3>Resultado da Triagem</h3>
          <p><b>ID:</b> ${data.id}</p>
          <p><b>Cor:</b> ${data.corPrevista}</p>
          <p><b>Confiança:</b> ${data.confianca}</p>
          <p><b>Status:</b> ${data.statusExecucao}</p>
        `;
        } catch (err) {
          document.getElementById("resultado").innerHTML =
            "<p style='color:red'>Erro ao chamar API</p>";
          console.error(err);
        }
      }
    </script>
  </body>
</html>
